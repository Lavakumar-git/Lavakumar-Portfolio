<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %} Portfolio {% endblock %}</title>

    {% load static %}

    <!-- Bootstrap 5 -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Bootstrap Icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{% static 'css/styles.css' %}" />
  </head>
  <body>
    <!-- Navbar Start -->
    <nav class="navbar navbar-expand-lg navbar-dark custom-navbar sticky-top">
      <div class="container-fluid">
        <a class="navbar-brand fw-bold" > WELCOME </a>

        <div class="navbar-nav ms-auto">
          <ul class="navbar-nav navbar-menu">
            <li class="nav-item">
              <a class="nav-link" href="/">Home</a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="/about/">About</a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="/skills/">Skills</a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="/projects/">Projects</a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="/contact/">Contact</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>
    <!-- Navbar End -->

    <!-- Main Content -->
    <main>{% block content %} {% endblock %}</main>

    <!-- Footer Start -->
    <footer class="footer-section">
      <div class="container text-center">
        <div class="social-icons mb-3">
          <a href="https://github.com/Lavakumar-git" target="_blank">
            <i class="bi bi-github"></i>
          </a>

          <a href="https://www.linkedin.com/in/s-lavakumar-058882382/" target="_blank">
            <i class="bi bi-linkedin"></i>
          </a>

        </div>

        <p class="mb-0">© {% now "Y" %} Portfolio. All Rights Reserved.</p>
      </div>
    </footer>
    <!-- Footer End -->

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Custom JS -->
    <script src="{% static 'js/main.js' %}"></script>
  </body>
</html>
